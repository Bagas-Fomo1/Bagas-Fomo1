<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .base { font-family: 'Courier New', monospace; font-weight: bold; }
      .title { font-size: 44px; }
      .sub { font-size: 15px; letter-spacing: 3px; }
      .rain { font-family: 'Courier New', monospace; font-size: 12px; fill: #ff1a1a; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <clipPath id="frame">
      <rect x="0" y="0" width="900" height="180" rx="6"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="180" fill="url(#bg)"/>

    <!-- matrix-style falling glyphs, faint background layer -->
    <g opacity="0.14">
      <text class="rain" x="30" y="20">01</text>
      <text class="rain" x="30" y="40">10</text>
      <text class="rain" x="30" y="60">11</text>
      <text class="rain" x="820" y="20">01</text>
      <text class="rain" x="820" y="40">00</text>
      <text class="rain" x="820" y="60">10</text>
      <text class="rain" x="80" y="150">0x1F</text>
      <text class="rain" x="760" y="150">0xA3</text>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 -40; 0 40" dur="3s" repeatCount="indefinite"/>
        <text class="rain" x="30" y="20">01</text>
        <text class="rain" x="30" y="40">10</text>
        <text class="rain" x="820" y="20">10</text>
        <text class="rain" x="820" y="40">01</text>
      </g>
    </g>

    <!-- top/bottom border lines -->
    <rect x="0" y="0" width="900" height="2" fill="#ff1a1a" opacity="0.6"/>
    <rect x="0" y="178" width="900" height="2" fill="#ff1a1a" opacity="0.6"/>

    <!-- scanline sweep -->
    <rect x="0" y="0" width="900" height="3" fill="#ffffff" opacity="0.07">
      <animate attributeName="y" values="0;180;0" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- sliced glitch text: 3 horizontal bands of the title, each offset independently -->
    <g>
      <clipPath id="sliceTop"><rect x="0" y="55" width="900" height="18"/></clipPath>
      <clipPath id="sliceMid"><rect x="0" y="73" width="900" height="18"/></clipPath>
      <clipPath id="sliceBot"><rect x="0" y="91" width="900" height="18"/></clipPath>
    </g>

    <!-- red channel -->
    <text x="450" y="100" text-anchor="middle" class="base title" fill="#ff1a1a" opacity="0.85">
      KEPO YA MBUD
      <animateTransform attributeName="transform" type="translate"
        values="0 0; -4 0; 3 0; -2 0; 0 0" dur="0.3s" repeatCount="indefinite"/>
    </text>

    <!-- cyan channel -->
    <text x="450" y="100" text-anchor="middle" class="base title" fill="#00e5ff" opacity="0.3">
      KEPO YA MBUD
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 4 0; -3 0; 2 0; 0 0" dur="0.25s" repeatCount="indefinite"/>
    </text>

    <!-- clipped slice glitch: top band jumps right occasionally -->
    <g clip-path="url(#sliceTop)">
      <text x="450" y="100" text-anchor="middle" class="base title" fill="#f5f5f5">
        KEPO YA MBUD
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 0; 12 0; 0 0; 0 0; -8 0; 0 0" dur="2.2s" repeatCount="indefinite"/>
      </text>
    </g>
    <!-- clipped slice glitch: mid band stays mostly still -->
    <g clip-path="url(#sliceMid)">
      <text x="450" y="100" text-anchor="middle" class="base title" fill="#f5f5f5">
        KEPO YA MBUD
      </text>
    </g>
    <!-- clipped slice glitch: bottom band jumps left occasionally -->
    <g clip-path="url(#sliceBot)">
      <text x="450" y="100" text-anchor="middle" class="base title" fill="#f5f5f5">
        KEPO YA MBUD
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 0; -10 0; 0 0; 0 0; 6 0; 0 0" dur="1.8s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- subtitle with terminal cursor -->
    <text x="450" y="130" text-anchor="middle" class="base sub" fill="#ff4d4d">
      [ ROOT ACCESS GRANTED ]<tspan fill="#ff1a1a">_</tspan>
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </text>

    <!-- side brackets, hacker-terminal framing -->
    <text x="25" y="100" class="base" font-size="34" fill="#ff1a1a" opacity="0.5">[</text>
    <text x="855" y="100" class="base" font-size="34" fill="#ff1a1a" opacity="0.5">]</text>

    <!-- roaming glitch bands -->
    <rect x="0" y="40" width="900" height="5" fill="#ff1a1a" opacity="0.4">
      <animate attributeName="y" values="40;150;30;110;40" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.3;0;0.4" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="140" width="900" height="4" fill="#00e5ff" opacity="0.3">
      <animate attributeName="y" values="140;60;150;35;140" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.2;0;0.3" dur="1.9s" repeatCount="indefinite"/>
    </rect>

    <!-- flicker overlay -->
    <rect width="900" height="180" fill="#000000">
      <animate attributeName="opacity" values="0;0;0.18;0;0;0.1;0;0.15;0" dur="2.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
